name: livelattice-observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.141.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otelcol-contrib/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - livelattice

  prometheus:
    image: prom/prometheus:v3.8.0
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./infra/observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./infra/observability/prometheus-rules.yaml:/etc/prometheus/rules/livelattice.yaml:ro
      - ./.docker-data/prometheus:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - livelattice

  grafana:
    image: grafana/grafana:12.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./.docker-data/grafana:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-4000}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - livelattice

  loki:
    image: grafana/loki:3.6.3
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-config.file=/etc/loki/local-config.yaml", "-verify-config"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - livelattice

  promtail:
    image: grafana/promtail:3.6.3
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./infra/observability/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    networks:
      - livelattice

  tempo:
    image: grafana/tempo:2.9.0
    user: "0:0"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro
      - ./.docker-data/tempo:/tmp/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    healthcheck:
      test: ["CMD", "/busybox/wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - livelattice

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_PORT:-16686}:16686"
      - "14250:14250"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - livelattice

networks:
  livelattice:
    name: livelattice_default
    external: true
