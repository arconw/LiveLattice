name: livelattice

x-placeholder-health: &placeholder-health
  interval: 10s
  timeout: 5s
  retries: 10

services:
  postgres:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-livelattice}
      POSTGRES_USER: ${POSTGRES_USER:-livelattice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livelattice_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init:/docker-entrypoint-initdb.d:ro
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - livelattice

  redis:
    image: redis:8.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - livelattice

  kafka:
    image: apache/kafka:4.1.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - livelattice

  clickhouse:
    image: clickhouse/clickhouse-server:25.11-alpine
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-livelattice}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-livelattice}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-livelattice_dev_password}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - livelattice

  opensearch:
    image: opensearchproject/opensearch:3.3.2
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "${OPENSEARCH_PERF_PORT:-9600}:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - livelattice

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-livelattice}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-livelattice_dev_password}
    ports:
      - "${MINIO_API_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - livelattice

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.4
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-livelattice}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-livelattice_dev_password}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-18080}:8080"
      - "${KEYCLOAK_MANAGEMENT_PORT:-19000}:9000"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/opt/keycloak/bin/kc.sh show-config >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s
    networks:
      - livelattice

  gateway:
    build:
      context: ./gateway
    environment:
      PORT: 3000
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health"]
      <<: *placeholder-health
    networks:
      - livelattice

  realtime:
    image: busybox:1.37
    command: sh -c "mkdir -p /www && printf realtime-ok > /www/health && httpd -f -p 3002 -h /www"
    ports:
      - "${REALTIME_PORT:-3002}:3002"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health"]
      <<: *placeholder-health
    networks:
      - livelattice

  core:
    build:
      context: ./core
    environment:
      SPRING_PROFILES_ACTIVE: docker
      LIVELATTICE_SNAPSHOTS_ENDPOINT: http://minio:9000
      LIVELATTICE_SNAPSHOTS_ACCESS_KEY: ${MINIO_ROOT_USER:-livelattice}
      LIVELATTICE_SNAPSHOTS_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-livelattice_dev_password}
      LIVELATTICE_SNAPSHOTS_BUCKET: ${MINIO_SNAPSHOTS_BUCKET:-livelattice-snapshots}
    ports:
      - "${CORE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health"]
      <<: *placeholder-health
    networks:
      - livelattice

  search:
    image: busybox:1.37
    command: sh -c "mkdir -p /www && printf search-ok > /www/health && httpd -f -p 8081 -h /www"
    ports:
      - "${SEARCH_SERVICE_PORT:-8081}:8081"
    depends_on:
      opensearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health"]
      <<: *placeholder-health
    networks:
      - livelattice

  notifications:
    image: busybox:1.37
    command: sh -c "mkdir -p /www && printf notifications-ok > /www/health && httpd -f -p 8082 -h /www"
    ports:
      - "${NOTIFICATIONS_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health"]
      <<: *placeholder-health
    networks:
      - livelattice

  import-export:
    image: busybox:1.37
    command: sh -c "mkdir -p /www && printf import-export-ok > /www/health && httpd -f -p 8083 -h /www"
    ports:
      - "${IMPORT_EXPORT_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health"]
      <<: *placeholder-health
    networks:
      - livelattice

  audit-log:
    image: busybox:1.37
    command: sh -c "mkdir -p /www && printf audit-log-ok > /www/health && httpd -f -p 8084 -h /www"
    ports:
      - "${AUDIT_LOG_PORT:-8084}:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health"]
      <<: *placeholder-health
    networks:
      - livelattice

  background-jobs:
    image: busybox:1.37
    command: sh -c "mkdir -p /www && printf background-jobs-ok > /www/health && httpd -f -p 8085 -h /www"
    ports:
      - "${BACKGROUND_JOBS_PORT:-8085}:8085"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health"]
      <<: *placeholder-health
    networks:
      - livelattice

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  clickhouse_data:
  opensearch_data:
  minio_data:

networks:
  livelattice:
    name: livelattice_default
