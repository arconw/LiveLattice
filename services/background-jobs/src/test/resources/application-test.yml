spring:
  application:
    name: background-jobs
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///livelattice
    username: livelattice
    password: livelattice_dev_password
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 0

livelattice:
  auth:
    internal-secret: livelattice_internal_dev_secret
  jobs:
    worker:
      enabled: false
    import-export:
      service-url: http://localhost:8083
