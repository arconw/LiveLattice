spring:
  application:
    name: import-export
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///livelattice
    username: livelattice
    password: livelattice_dev_password
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 0

livelattice:
  importexport:
    max-file-size-bytes: 104857600
    sync-threshold-bytes: 10485760
    storage-endpoint: http://localhost:9000
    storage-access-key: livelattice
    storage-secret-key: livelattice_dev_password
    storage-bucket: livelattice-imports
    storage-url-expiry-minutes: 60
    job-topic: import-export-jobs
    clamav-enabled: false
