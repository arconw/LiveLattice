spring:
  application:
    name: import-export
  servlet:
    multipart:
      max-file-size: ${IMPORT_MAX_FILE_SIZE:100MB}
      max-request-size: ${IMPORT_MAX_REQUEST_SIZE:100MB}
      file-size-threshold: ${IMPORT_FILE_SIZE_THRESHOLD:0}
  datasource:
    url: jdbc:postgresql://localhost:5432/livelattice
    username: ${POSTGRES_USER:livelattice}
    password: ${POSTGRES_PASSWORD:livelattice_dev_password}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: import-export
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

livelattice:
  auth:
    internal-secret: ${INTERNAL_AUTH_SECRET:livelattice_internal_dev_secret}
  audit:
    events:
      enabled: ${AUDIT_EVENTS_ENABLED:true}
      topic: ${KAFKA_AUDIT_TOPIC:livelattice.audit.events}
  importexport:
    max-file-size-bytes: ${IMPORT_MAX_FILE_SIZE_BYTES:104857600}
    sync-threshold-bytes: ${IMPORT_SYNC_THRESHOLD_BYTES:10485760}
    storage-endpoint: ${STORAGE_ENDPOINT:http://localhost:9100}
    storage-access-key: ${STORAGE_ACCESS_KEY:livelattice}
    storage-secret-key: ${STORAGE_SECRET_KEY:livelattice_dev_password}
    storage-bucket: ${STORAGE_BUCKET:livelattice-imports}
    storage-url-expiry-minutes: ${STORAGE_URL_EXPIRY_MINUTES:60}
    job-topic: ${JOB_TOPIC:import-export-jobs}
    clamav-enabled: ${CLAMAV_ENABLED:false}
    clamav-host: ${CLAMAV_HOST:clamav}
    clamav-port: ${CLAMAV_PORT:3310}
