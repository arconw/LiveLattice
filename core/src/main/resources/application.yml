spring:
  application:
    name: core
  datasource:
    url: jdbc:postgresql://localhost:5432/livelattice
    username: livelattice
    password: livelattice_dev_password
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

server:
  port: 8080
