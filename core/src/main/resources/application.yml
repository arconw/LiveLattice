spring:
  application:
    name: core
  datasource:
    url: jdbc:postgresql://localhost:5432/livelattice
    username: livelattice
    password: livelattice_dev_password
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

livelattice:
  auth:
    internal-secret: ${INTERNAL_AUTH_SECRET:livelattice_internal_dev_secret}
    api-key-cache-ttl-seconds: ${API_KEY_CACHE_TTL_SECONDS:300}
  snapshots:
    endpoint: ${LIVELATTICE_SNAPSHOTS_ENDPOINT:http://localhost:9100}
    access-key: ${LIVELATTICE_SNAPSHOTS_ACCESS_KEY:livelattice}
    secret-key: ${LIVELATTICE_SNAPSHOTS_SECRET_KEY:livelattice_dev_password}
    bucket: ${LIVELATTICE_SNAPSHOTS_BUCKET:livelattice-snapshots}
  search:
    events:
      enabled: ${SEARCH_EVENTS_ENABLED:true}
  audit:
    events:
      enabled: ${AUDIT_EVENTS_ENABLED:true}
  analytics:
    clickhouse-url: jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_HTTP_PORT:8123}/${CLICKHOUSE_DB:livelattice}
    clickhouse-user: ${CLICKHOUSE_USER:livelattice}
    clickhouse-password: ${CLICKHOUSE_PASSWORD:livelattice_dev_password}
