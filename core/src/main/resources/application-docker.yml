spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/livelattice
    username: ${POSTGRES_USER:livelattice}
    password: ${POSTGRES_PASSWORD:livelattice_dev_password}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}

livelattice:
  auth:
    internal-secret: ${INTERNAL_AUTH_SECRET:livelattice_internal_dev_secret}
    api-key-cache-ttl-seconds: ${API_KEY_CACHE_TTL_SECONDS:300}
  snapshots:
    endpoint: ${LIVELATTICE_SNAPSHOTS_ENDPOINT:http://minio:9000}
    access-key: ${LIVELATTICE_SNAPSHOTS_ACCESS_KEY:livelattice}
    secret-key: ${LIVELATTICE_SNAPSHOTS_SECRET_KEY:livelattice_dev_password}
    bucket: ${LIVELATTICE_SNAPSHOTS_BUCKET:livelattice-snapshots}
  search:
    events:
      enabled: ${SEARCH_EVENTS_ENABLED:true}
  audit:
    events:
      enabled: ${AUDIT_EVENTS_ENABLED:true}
  analytics:
    clickhouse-url: jdbc:clickhouse://${CLICKHOUSE_HOST:clickhouse}:${CLICKHOUSE_HTTP_PORT:8123}/${CLICKHOUSE_DB:livelattice}
    clickhouse-user: ${CLICKHOUSE_USER:livelattice}
    clickhouse-password: ${CLICKHOUSE_PASSWORD:livelattice_dev_password}
