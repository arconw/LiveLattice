global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector:8889
          - otel-collector:8888
        labels:
          service: otel-collector
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:3000
        labels:
          service: gateway
  - job_name: realtime
    metrics_path: /metrics
    static_configs:
      - targets:
          - realtime:3002
        labels:
          service: realtime
  - job_name: spring-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - core:8080
        labels:
          service: core
      - targets:
          - search:8081
        labels:
          service: search
      - targets:
          - notifications:8082
        labels:
          service: notifications
      - targets:
          - import-export:8083
        labels:
          service: import-export
      - targets:
          - audit-log:8084
        labels:
          service: audit-log
      - targets:
          - background-jobs:8085
        labels:
          service: background-jobs
  - job_name: observability
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
        labels:
          service: loki
      - targets:
          - tempo:3200
        labels:
          service: tempo
